<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>DevAI Studio — Admin Setup</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0d;--bg1:#141414;--bg2:#1a1a1a;--border:#2e2e2e;--green:#3ddc84;--green2:#2ab56d;--green3:#1a7a4a;--red:#e06c75;--text:#e8e8e8;--text2:#999;--text3:#555;--code:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:14px;overflow:hidden;width:100%;max-width:400px}
.card-top{height:2px;background:linear-gradient(90deg,transparent,var(--red),transparent)}
.inner{padding:28px}
.icon{width:44px;height:44px;background:rgba(224,108,117,.12);border:1px solid rgba(224,108,117,.3);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;margin:0 auto 14px}
h1{font-family:var(--code);font-size:18px;text-align:center;margin-bottom:6px;color:var(--red)}
.sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:22px;line-height:1.5}
.warn{background:rgba(229,192,123,.08);border:1px solid rgba(229,192,123,.3);border-radius:6px;padding:10px 12px;font-size:12px;color:#e5c07b;margin-bottom:20px;line-height:1.5}
label{display:block;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;font-family:var(--code);margin-bottom:5px}
input{width:100%;height:40px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;padding:0 12px;font-family:'Inter',sans-serif;outline:none;margin-bottom:14px;transition:.15s}
input:focus{border-color:var(--green3);box-shadow:0 0 0 3px rgba(61,220,132,.06)}
.btn{width:100%;height:40px;background:var(--green3);border:1px solid var(--green2);border-radius:7px;color:var(--green);font-size:13px;font-weight:600;font-family:var(--code);cursor:pointer;transition:.2s}
.btn:hover{background:var(--green2);color:#0a1a10}
.btn:disabled{opacity:.5;cursor:not-allowed}
.msg{border-radius:6px;padding:9px 12px;font-size:12px;margin-top:12px;display:none;line-height:1.5}
.err{background:rgba(224,108,117,.1);border:1px solid rgba(224,108,117,.3);color:var(--red)}
.ok{background:rgba(61,220,132,.07);border:1px solid var(--green3);color:var(--green)}
.msg.show{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="card-top"></div>
  <div class="inner">
    <div class="icon">🛡</div>
    <h1>Admin Setup</h1>
    <p class="sub">Одноразовая настройка. Создай свой admin-аккаунт с полными правами.</p>
    <div class="warn">⚠ Удали этот файл с сервера после использования!</div>
    <label for="aName">Имя</label>
    <input id="aName" type="text" placeholder="Твоё имя" maxlength="50">
    <label for="aEmail">Email</label>
    <input id="aEmail" type="email" placeholder="admin@example.com" maxlength="100">
    <label for="aPass">Пароль</label>
    <input id="aPass" type="password" placeholder="Надёжный пароль" maxlength="128">
    <button class="btn" id="setupBtn" onclick="setupAdmin()">🛡 Создать Admin аккаунт</button>
    <div class="msg err" id="errMsg"></div>
    <div class="msg ok"  id="okMsg"></div>
  </div>
</div>

<script>
async function setupAdmin() {
  const name  = document.getElementById('aName').value.trim();
  const email = document.getElementById('aEmail').value.trim().toLowerCase();
  const pass  = document.getElementById('aPass').value;

  if (!name || name.length < 2)      return show('err', 'Введи имя (мин. 2 символа)');
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return show('err', 'Некорректный email');
  if (pass.length < 8)               return show('err', 'Пароль минимум 8 символов');

  const btn = document.getElementById('setupBtn');
  btn.disabled    = true;
  btn.textContent = '⏳ Создаём...';

  try {
    const buf  = new TextEncoder().encode(pass);
    const hash = await crypto.subtle.digest('SHA-256', buf);
    const passHash = Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');

    let users = [];
    try { users = JSON.parse(localStorage.getItem('devai_users') || '[]'); } catch {}
    if (!Array.isArray(users)) users = [];

    // Удаляем старый аккаунт с этим email если есть
    users = users.filter(u => u.email !== email);
    users.unshift({ name, email, passHash, role: 'admin', createdAt: Date.now() });
    localStorage.setItem('devai_users', JSON.stringify(users));

    // Авторизуем
    localStorage.setItem('devai_user', JSON.stringify({ name, email, role: 'admin', loginAt: Date.now() }));

    show('ok', '✓ Admin аккаунт создан! Переходим в админ-панель...');
    setTimeout(() => { window.location.href = 'admin.html'; }, 1500);
  } catch(e) {
    btn.disabled    = false;
    btn.textContent = '🛡 Создать Admin аккаунт';
    show('err', 'Ошибка: ' + e.message);
  }
}

function show(type, msg) {
  ['errMsg','okMsg'].forEach(id => { const el=document.getElementById(id); el.textContent=''; el.classList.remove('show'); });
  const el = document.getElementById(type === 'err' ? 'errMsg' : 'okMsg');
  el.textContent = msg;
  el.classList.add('show');
}

document.getElementById('aPass').addEventListener('keydown', e => { if(e.key==='Enter') setupAdmin(); });
</script>
</body>
</html>
